# Porta padrão do servidor embutido (Tomcat)
server.port=8080

# Nome da aplicação (aparece nos logs do Spring)
spring.application.name=paises

# Thymeleaf — desativa o cache em desenvolvimento para
# que alterações nos templates sejam refletidas sem reiniciar
spring.thymeleaf.cache=false

# Codificação de caracteres (garante acentos corretos)
spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
