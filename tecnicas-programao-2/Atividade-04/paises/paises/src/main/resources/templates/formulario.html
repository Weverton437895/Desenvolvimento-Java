<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Busca de Países</title>
    <style>
        /* ── Reset & base ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
        }

        /* ── Card ─────────────────────────────────────────────────── */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        .globe { font-size: 3.5rem; margin-bottom: 16px; }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #e96c4c, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        /* ── Form ─────────────────────────────────────────────────── */
        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }

        input[type="text"]:focus {
            border-color: #e96c4c;
            background: rgba(255,255,255,0.12);
        }

        button {
            padding: 14px 22px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #e96c4c, #f5a623);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover  { opacity: 0.88; }
        button:active { transform: scale(0.97); }

        /* ── Mensagem de erro ─────────────────────────────────────── */
        .erro {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(233, 108, 76, 0.18);
            border: 1px solid rgba(233, 108, 76, 0.4);
            color: #f8b4a0;
            font-size: 0.9rem;
        }

        /* ── Exemplos ─────────────────────────────────────────────── */
        .hint {
            margin-top: 24px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.35);
        }

        .hint span {
            display: inline-block;
            margin: 4px 3px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="globe">🌍</div>
    <h1>Busca de Países</h1>
    <p class="subtitle">Digite o nome de um país em inglês para ver seus dados.</p>

    <!--
        Formulário que envia GET para /resultado?nome=...
        O método GET é ideal aqui: a URL fica "compartilhável".
    -->
    <form action="/resultado" method="get">
        <div class="input-group">
            <input
                type="text"
                name="nome"
                placeholder="Ex: Brazil, France, Japan..."
                autofocus
                required
            />
            <button type="submit">🔍</button>
        </div>
    </form>

    <!-- Mensagem de erro (exibida apenas se o atributo 'erro' existir no model) -->
    <div class="erro" th:if="${erro}" th:text="${erro}"></div>

    <p class="hint">
        Tente:
        <span>Brazil</span>
        <span>France</span>
        <span>Japan</span>
        <span>Germany</span>
    </p>
</div>

</body>
</html>
